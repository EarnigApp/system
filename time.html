<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA & Mobile Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>ZenithOS</title>

    <!-- Base64 Encoded Manifest to prevent syntax parsing errors -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiWmVuaXRoT1MiLCJzaG9ydF9uYW1lIjoiWmVuaXRoT1MiLCJkaXNwbGF5IjoiZnVsbHNjcmVlbiIsImJhY2tncm91bmRfY29sb3IiOiIjMDAwMDAwIiwidGhlbWVfY29sb3IiOiIjMEE4NEZGIn0=">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 0. ZENITH KERNEL --- */
        :root {
            --bg: #000000;
            --surface: #121212;
            --surface-active: #1e1e1e;
            --border: #2a2a2a;
            --primary: #0A84FF;
            --success: #30D158;
            --danger: #FF453A;
            --text: #FFFFFF;
            --dim: #888888;
            --glass: rgba(20, 20, 20, 0.85);
            --blur: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: var(--text); height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden; overscroll-behavior-y: none;
        }

        /* --- 1. BOOT SCREEN (FULLSCREEN GATEWAY) --- */
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .orbit-system { position: relative; width: 180px; height: 180px; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; }
        .core-mind { font-size: 3rem; color: var(--primary); z-index: 10; text-shadow: 0 0 40px var(--primary); animation: pulse-mind 2s infinite ease-in-out; }
        .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: center; justify-content: center; }
        .ring-1 { width: 100px; height: 100px; animation: spin 8s linear infinite; }
        .ring-2 { width: 160px; height: 160px; animation: spin-rev 12s linear infinite; }
        .orbit-icon { position: absolute; width: 28px; height: 28px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; border: 1px solid #333; }
        
        .pos-1 { top: -14px; color: #00f3ff; } .pos-2 { bottom: -14px; color: #30d158; }
        .pos-3 { left: -14px; color: #ff00ff; } .pos-4 { right: -14px; color: #ff9f0a; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-mind { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #btn-boot {
            padding: 16px 40px; background: var(--text); color: var(--bg); font-weight: 800; font-size: 1.1rem;
            border: none; border-radius: 100px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2); transition: 0.3s;
        }
        #btn-boot:active { transform: scale(0.95); }

        /* --- 2. HEADER --- */
        header {
            padding: max(25px, env(safe-area-inset-top)) 20px 10px;
            background: var(--glass); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
            border-bottom: 1px solid var(--border); z-index: 50;
        }
        .header-grid { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; }
        .zenith-logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }
        .zenith-logo span { color: var(--primary); } 
        .god-badge { font-size: 0.65rem; font-weight: 800; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .clock-time { font-size: 2.2rem; font-weight: 600; line-height: 1; font-variant-numeric: tabular-nums; }
        .clock-date { font-size: 0.85rem; color: var(--dim); font-weight: 600; text-align: right; margin-top: 4px; }

        /* --- 3. TABS --- */
        .tabs-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tabs-scroll::-webkit-scrollbar { display: none; }
        .tab-pill { padding: 8px 16px; background: #1c1c1e; border: 1px solid #333; border-radius: 100px; color: var(--dim); font-size: 0.85rem; font-weight: 600; white-space: nowrap; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s ease; }
        .tab-pill.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.02); }

        /* --- 4. TIMELINE --- */
        .timeline-area { flex: 1; overflow-y: auto; padding: 20px 15px 120px; scrollbar-width: none; scroll-behavior: smooth; }
        .timeline-area::-webkit-scrollbar { display: none; }
        
        .task-unit { display: flex; margin-bottom: 20px; position: relative; opacity: 0.4; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .task-unit::before { content: ''; position: absolute; left: 24px; top: 44px; bottom: -25px; width: 2px; background: #222; z-index: 0; }
        .task-unit:last-child::before { display: none; }

        .task-unit.past { opacity: 0.3; }
        .task-unit.future { opacity: 0.7; }
        
        .task-unit.active { opacity: 1; transform: scale(1.02); }
        .task-unit.active .task-icon { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 0 20px rgba(10, 132, 255, 0.3); }
        .task-unit.active .task-card { background: var(--surface-active); border-color: #444; }
        .task-unit.active .time-txt { color: var(--primary); }

        .icon-col { width: 50px; position: relative; z-index: 2; display: flex; justify-content: center; }
        .task-icon { width: 48px; height: 48px; border-radius: 50%; background: #111; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #666; transition: 0.3s; }

        .card-col { flex: 1; margin-left: 15px; }
        .time-txt { font-size: 0.8rem; font-weight: 700; color: var(--dim); margin-bottom: 6px; display: block; }
        .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; position: relative; transition: 0.3s; user-select: none; }
        .t-head { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
        .t-sub { font-size: 0.85rem; color: var(--dim); line-height: 1.4; }

        .edit-controls { position: absolute; right: 10px; top: 10px; display: none; gap: 8px; }
        .is-editing .edit-controls { display: flex; }
        .mini-btn { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .mini-btn:active { transform: scale(0.9); }

        /* --- 5. DOCK & MODALS --- */
        .dock {
            position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 100;
        }
        .dock-icon { font-size: 1.4rem; color: #666; cursor: pointer; transition: 0.2s; }
        .dock-icon:active { transform: scale(0.8); }
        .dock-icon.active-mode { color: var(--primary); }
        .dock-icon.danger-mode { color: var(--danger); }

        .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: flex-end; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
        .modal-wrap.open { opacity: 1; visibility: visible; }
        .modal-panel { width: 100%; background: #181818; border-radius: 24px 24px 0 0; padding: max(30px, env(safe-area-inset-bottom)); border-top: 1px solid #333; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-wrap.open .modal-panel { transform: translateY(0); }
        
        input, select { width: 100%; padding: 15px; background: #2a2a2a; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 12px; font-size: 1rem; outline: none; transition: 0.2s; }
        input[type="file"] { background: #111; border: 1px dashed #444; color: var(--dim); font-size: 0.85rem; padding: 10px; }
        input:focus, select:focus { border-color: var(--primary); background: #222; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; font-weight: 700; border-radius: 12px; border: none; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--danger); }

        /* --- 6. TOAST NOTIFICATIONS --- */
        #toast-container { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: var(--glass); backdrop-filter: blur(var(--blur)); border-left: 4px solid var(--primary); border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); color: #fff; animation: toastEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border: 1px solid rgba(255,255,255,0.1); border-left-width: 4px; }
        .toast.fade-out { animation: toastLeave 0.3s ease forwards; }
        .toast-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .toast-title i { color: var(--primary); }
        .toast-desc { font-size: 0.85rem; color: var(--dim); line-height: 1.4; }
        
        @keyframes toastEnter { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastLeave { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Notification Audio Element -->
    <audio id="notif-sound" preload="auto"></audio>
    <div id="toast-container"></div>

    <div id="boot-screen">
        <div class="orbit-system">
            <i class="fa-solid fa-bolt core-mind"></i>
            <div class="ring ring-1">
                <div class="orbit-icon pos-1"><i class="fa-solid fa-code"></i></div> 
                <div class="orbit-icon pos-2"><i class="fa-solid fa-terminal"></i></div> 
            </div>
            <div class="ring ring-2">
                <div class="orbit-icon pos-3"><i class="fa-solid fa-database"></i></div> 
                <div class="orbit-icon pos-4"><i class="fa-solid fa-microchip"></i></div> 
            </div>
        </div>
        <!-- Button forces interaction for Fullscreen API and Audio Playback -->
        <button id="btn-boot" onclick="enterZenith()">Initialize OS</button>
    </div>

    <header>
        <div class="header-grid">
            <div>
                <span class="god-badge">GOD MODE ACTIVE</span>
                <div class="zenith-logo">Zenith<span>OS</span></div>
            </div>
            <div style="text-align: right;">
                <div class="clock-time" id="clock">00:00</div>
                <div class="clock-date" id="date">--</div>
            </div>
        </div>
        <div class="tabs-scroll" id="tabs"></div>
    </header>

    <div class="timeline-area" id="timeline"></div>

    <div class="dock">
        <div class="dock-icon active-mode" id="notif-toggle-btn" onclick="toggleNotifications()" title="Toggle Sound"><i class="fa-solid fa-bell"></i></div>
        <div class="dock-icon" id="task-edit-btn" onclick="toggleTaskEdit()" title="Edit Mode (HotKey: E)"><i class="fa-solid fa-pen-to-square"></i></div>
        <div class="dock-icon" onclick="openTaskModal()" title="New Task (HotKey: N)"><i class="fa-solid fa-plus"></i></div>
        <div class="dock-icon" onclick="openSystemModal()" title="Settings"><i class="fa-solid fa-gear"></i></div>
    </div>

    <!-- Task Modal -->
    <div class="modal-wrap" id="task-modal">
        <div class="modal-panel">
            <h3 style="margin-bottom:20px; color:#fff;" id="task-modal-title">Edit Task</h3>
            <input type="hidden" id="edit-id">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="time" id="t-start" required>
                <input type="time" id="t-end" required>
            </div>
            <input type="text" id="t-title" placeholder="Activity Name" autocomplete="off">
            <input type="text" id="t-desc" placeholder="Details" autocomplete="off">
            <button class="btn-main" onclick="saveTask()">Save Task</button>
            <button class="btn-main" style="background:#2a2a2a; color:#fff" onclick="closeModal('task-modal')">Cancel</button>
        </div>
    </div>

    <!-- System Modal -->
    <div class="modal-wrap" id="system-modal">
        <div class="modal-panel" style="max-height: 80vh; overflow-y: auto;">
            <h3 style="margin-bottom:20px; color:#fff;">System Manager</h3>
            
            <div style="margin-bottom:15px; color:#888; font-size:0.9rem;">Manage Routine Case:</div>
            <input type="text" id="case-name" placeholder="Case Name (e.g. Exam Prep)">
            <select id="case-icon">
                <option value="fa-solid fa-house">🏠 Home</option>
                <option value="fa-solid fa-laptop-code">💻 Coding/Dev</option>
                <option value="fa-solid fa-graduation-cap">🎓 College</option>
                <option value="fa-solid fa-book">📚 Study/Focus</option>
                <option value="fa-solid fa-gamepad">🎮 Gaming</option>
                <option value="fa-solid fa-bed">🛌 Rest</option>
            </select>
            <button class="btn-main" onclick="updateCurrentCase()">Update Routine</button>
            <button class="btn-main" onclick="createNewCase()">+ New Routine</button>
            
            <hr style="border: 1px solid #222; margin: 25px 0;">
            
            <div style="margin-bottom:10px; color:#888; font-size:0.9rem;">Custom Alert Sound (Max 2MB):</div>
            <input type="file" id="audio-upload" accept="audio/*">
            <button class="btn-main" style="background:#222; color:#fff; font-size:0.85rem; margin-top:5px;" onclick="resetDefaultAudio()">Restore Default Sound</button>

            <hr style="border: 1px solid #222; margin: 25px 0;">

            <div style="display:flex; gap:10px;">
                <button class="btn-main btn-danger" onclick="deleteCurrentCase()">Delete Routine</button>
                <button class="btn-main" style="background:#111; color:#fff; border:1px solid #333;" onclick="exportData()">Export Data</button>
            </div>
            <button class="btn-main" style="background:#2a2a2a; color:#fff" onclick="closeModal('system-modal')">Close Window</button>
        </div>
    </div>

    <script>
        // --- 1. CORE DATA & AUDIO URLS ---
        const DEFAULT_AUDIO = "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3";
        const DEFAULT_DATA = [
            {
                name: "Standard Dev",
                icon: "fa-solid fa-laptop-code",
                tasks: [
                    { id: 1, start: "07:00", end: "07:30", title: "System Boot", desc: "Hydrate & Quick Exercise" },
                    { id: 2, start: "07:30", end: "09:00", title: "Deep Work: Project", desc: "No distractions. Code/Logic execution." },
                    { id: 3, start: "09:00", end: "09:30", title: "Fuel Intake", desc: "Breakfast & Email sync" },
                    { id: 4, start: "09:30", end: "12:30", title: "Academic/Classes", desc: "Focus mode engaged" },
                    { id: 5, start: "12:30", end: "13:30", title: "Downtime & Lunch", desc: "Relaxation protocols" },
                    { id: 6, start: "13:30", end: "17:00", title: "Secondary Dev", desc: "Scripts, UI/UX, Debugging" },
                    { id: 7, start: "17:00", end: "18:00", title: "Physical Sync", desc: "Sports / Outdoor movement" },
                    { id: 8, start: "18:00", end: "21:00", title: "Content & Research", desc: "AI tools, SEO, Analytics" },
                    { id: 9, start: "21:00", end: "22:00", title: "Dinner & Media", desc: "Anime / Youtube" },
                    { id: 10, start: "22:00", end: "23:00", title: "Planning & Wind Down", desc: "Prepare tomorrow's schema" },
                    { id: 11, start: "23:00", end: "07:00", title: "Sleep Cycle", desc: "Restoration Phase" }
                ]
            }
        ];

        // --- 2. STATE MANAGEMENT ---
        let state = {
            routines: [],
            activeIndex: 0,
            isEditing: false,
            soundEnabled: true,
            audioUnlocked: false,
            lastActiveTaskId: null,
            timeScrolled: false
        };

        // --- 3. INIT & BOOT PROCESS ---
        function init() {
            // Load Routine Data
            const saved = localStorage.getItem('zenith_data_v4');
            state.routines = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
            
            // Load Audio Preferences
            const savedSound = localStorage.getItem('zenith_sound');
            state.soundEnabled = savedSound !== null ? savedSound === 'true' : true;
            updateNotificationIcon();

            // Load Custom Audio
            const customAudio = localStorage.getItem('zenith_custom_audio');
            document.getElementById('notif-sound').src = customAudio ? customAudio : DEFAULT_AUDIO;

            // Setup Hotkeys
            document.addEventListener('keydown', handleHotkeys);
            setupAudioUploader();
        }

        function enterZenith() {
            // 1. Force Fullscreen (Hides URL Bar natively on Android/PC)
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(e => console.log("Fullscreen ignored by browser."));
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen(); // Safari
            }

            // 2. Unlock Audio Context
            const audio = document.getElementById('notif-sound');
            audio.volume = 0; 
            audio.play().then(() => {
                audio.pause(); audio.currentTime = 0; audio.volume = 1;
                state.audioUnlocked = true;
            }).catch(e => console.warn("Audio unlock pending."));

            // 3. Transition UI
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('boot-screen').style.display = 'none'; 
                startEngine(); 
            }, 600);
        }

        function startEngine() {
            renderTabs();
            renderList();
            setInterval(tick, 1000);
            tick();
        }

        // --- 4. ENGINE LOGIC ---
        function tick() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            document.getElementById('date').innerText = now.toLocaleDateString([], {weekday:'short', day:'2-digit', month:'short'});
            processTimeline(now);
        }

        function processTimeline(now) {
            if(!state.routines[state.activeIndex]) return;
            const currM = now.getHours() * 60 + now.getMinutes();
            let activeTaskFound = null;

            document.querySelectorAll('.task-unit').forEach(row => {
                const startM = parseInt(row.dataset.start);
                let endM = parseInt(row.dataset.end);
                
                if(endM <= startM) endM += 1440;
                let checkM = currM;
                if(checkM < startM && startM > 1000) checkM += 1440;

                row.classList.remove('active', 'past', 'future');

                if (checkM >= startM && checkM < endM) {
                    row.classList.add('active');
                    activeTaskFound = { id: row.id.split('-')[1], title: row.dataset.title, desc: row.dataset.desc };
                    
                    if(!state.timeScrolled) {
                        row.scrollIntoView({behavior:'smooth', block:'center'});
                        state.timeScrolled = true;
                    }
                } else if (checkM >= endM) {
                    row.classList.add('past');
                } else {
                    row.classList.add('future');
                }
            });

            // Trigger Notifications
            if (activeTaskFound && state.lastActiveTaskId !== activeTaskFound.id) {
                if (state.lastActiveTaskId !== null) triggerAlert(activeTaskFound);
                state.lastActiveTaskId = activeTaskFound.id;
            } else if (!activeTaskFound) {
                state.lastActiveTaskId = null;
            }
        }

        // --- 5. RENDERERS ---
        function renderTabs() {
            const c = document.getElementById('tabs');
            c.innerHTML = '';
            state.routines.forEach((r, i) => {
                const p = document.createElement('div');
                p.className = `tab-pill ${i === state.activeIndex ? 'active' : ''}`;
                p.innerHTML = `<i class="${r.icon}"></i> ${r.name}`;
                p.onclick = () => { 
                    state.activeIndex = i; 
                    state.timeScrolled = false; 
                    state.lastActiveTaskId = null; 
                    renderTabs(); renderList(); tick();
                };
                c.appendChild(p);
            });
        }

        function renderList() {
            const c = document.getElementById('timeline');
            c.innerHTML = '';
            const tasks = state.routines[state.activeIndex]?.tasks || [];
            
            tasks.sort((a,b) => getM(a.start) - getM(b.start)).forEach(t => {
                const div = document.createElement('div');
                div.className = 'task-unit future';
                div.id = `unit-${t.id}`;
                div.dataset.start = getM(t.start);
                div.dataset.end = getM(t.end);
                div.dataset.title = t.title;
                div.dataset.desc = t.desc;

                div.ondblclick = () => editTask(t.id);

                div.innerHTML = `
                    <div class="icon-col"><div class="task-icon"><i class="${getSmartIcon(t.title)}"></i></div></div>
                    <div class="card-col">
                        <span class="time-txt">${t.start} - ${t.end}</span>
                        <div class="task-card">
                            <div class="t-head">${t.title}</div>
                            <div class="t-sub">${t.desc}</div>
                            <div class="edit-controls">
                                <button class="mini-btn" style="background:#fff; color:#000" onclick="event.stopPropagation(); editTask(${t.id})"><i class="fa-solid fa-pencil"></i></button>
                                <button class="mini-btn" style="background:#ff453a; color:#fff" onclick="event.stopPropagation(); delTask(${t.id})"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                c.appendChild(div);
            });
            document.body.classList.toggle('is-editing', state.isEditing);
        }

        // --- 6. AUDIO & NOTIFICATIONS ---
        function toggleNotifications() {
            state.soundEnabled = !state.soundEnabled;
            localStorage.setItem('zenith_sound', state.soundEnabled);
            updateNotificationIcon();
            
            if (state.soundEnabled) {
                if ("Notification" in window) Notification.requestPermission();
                showToast("Alerts Active", "Audio and visual alerts are on.");
                if(state.audioUnlocked) document.getElementById('notif-sound').play().catch(e=>{});
            }
        }

        function updateNotificationIcon() {
            const btn = document.getElementById('notif-toggle-btn');
            btn.className = `dock-icon ${state.soundEnabled ? 'active-mode' : 'danger-mode'}`;
            btn.innerHTML = `<i class="fa-solid ${state.soundEnabled ? 'fa-bell' : 'fa-bell-slash'}"></i>`;
        }

        function setupAudioUploader() {
            document.getElementById('audio-upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                // Limit file size to ~2MB because LocalStorage has a 5MB total limit
                if (file.size > 2 * 1024 * 1024) { 
                    alert("File too large! Please select an audio file under 2MB to save in the browser.");
                    e.target.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    const base64Audio = evt.target.result;
                    try {
                        localStorage.setItem('zenith_custom_audio', base64Audio);
                        document.getElementById('notif-sound').src = base64Audio;
                        showToast("Audio Saved", "Custom notification sound successfully set.");
                        
                        // Play a test sound
                        if(state.soundEnabled && state.audioUnlocked) {
                            const audio = document.getElementById('notif-sound');
                            audio.currentTime = 0; audio.play();
                        }
                    } catch (err) {
                        alert("Storage Error: File is still too large for local storage. Try a shorter sound clip.");
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function resetDefaultAudio() {
            localStorage.removeItem('zenith_custom_audio');
            document.getElementById('notif-sound').src = DEFAULT_AUDIO;
            document.getElementById('audio-upload').value = '';
            showToast("Reset Complete", "Default notification sound restored.");
            if(state.soundEnabled && state.audioUnlocked) {
                const audio = document.getElementById('notif-sound');
                audio.currentTime = 0; audio.play();
            }
        }

        function triggerAlert(task) {
            if (!state.soundEnabled) return;
            if (state.audioUnlocked) {
                const audio = document.getElementById('notif-sound');
                audio.currentTime = 0; audio.play().catch(e => {});
            }
            showToast(task.title, task.desc);
            if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                new Notification("ZenithOS: " + task.title, { body: task.desc });
            }
        }

        function showToast(title, desc) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<div class="toast-title"><i class="${getSmartIcon(title)}"></i> ${title}</div><div class="toast-desc">${desc}</div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- 7. EDITING & DATA ---
        function toggleTaskEdit() {
            state.isEditing = !state.isEditing;
            document.getElementById('task-edit-btn').classList.toggle('active-mode', state.isEditing);
            renderList(); tick();
        }

        function openTaskModal() {
            document.getElementById('task-modal-title').innerText = "New Task";
            document.getElementById('edit-id').value = '';
            document.getElementById('t-start').value = ''; document.getElementById('t-end').value = '';
            document.getElementById('t-title').value = ''; document.getElementById('t-desc').value = '';
            document.getElementById('task-modal').classList.add('open');
            setTimeout(() => document.getElementById('t-title').focus(), 100);
        }

        function editTask(id) {
            const t = state.routines[state.activeIndex].tasks.find(x => x.id == id);
            if(!t) return;
            document.getElementById('task-modal-title').innerText = "Edit Task";
            document.getElementById('edit-id').value = id;
            document.getElementById('t-start').value = t.start; document.getElementById('t-end').value = t.end;
            document.getElementById('t-title').value = t.title; document.getElementById('t-desc').value = t.desc;
            document.getElementById('task-modal').classList.add('open');
        }

        function saveTask() {
            const start = document.getElementById('t-start').value;
            const end = document.getElementById('t-end').value || start;
            const title = document.getElementById('t-title').value;
            const desc = document.getElementById('t-desc').value;
            const id = document.getElementById('edit-id').value;

            if(!start || !title) return showToast("Error", "Time and Title are required.");

            const list = state.routines[state.activeIndex].tasks;
            if(id) {
                const t = list.find(x => x.id == id);
                t.start = start; t.end = end; t.title = title; t.desc = desc;
            } else {
                list.push({ id: Date.now(), start, end, title, desc });
            }
            
            saveData(); closeModal('task-modal'); renderList(); tick();
        }

        function delTask(id) {
            if(confirm("Delete this task?")) {
                state.routines[state.activeIndex].tasks = state.routines[state.activeIndex].tasks.filter(x => x.id != id);
                saveData(); renderList(); tick();
            }
        }

        function openSystemModal() {
            const curr = state.routines[state.activeIndex];
            document.getElementById('case-name').value = curr.name;
            document.getElementById('case-icon').value = curr.icon;
            document.getElementById('system-modal').classList.add('open');
        }

        function updateCurrentCase() {
            state.routines[state.activeIndex].name = document.getElementById('case-name').value || "Routine";
            state.routines[state.activeIndex].icon = document.getElementById('case-icon').value;
            saveData(); closeModal('system-modal'); renderTabs();
        }

        function createNewCase() {
            state.routines.push({ name: "New Routine", icon: "fa-solid fa-folder", tasks: [] });
            state.activeIndex = state.routines.length - 1; 
            saveData(); closeModal('system-modal'); renderTabs(); renderList();
        }

        function deleteCurrentCase() {
            if(state.routines.length <= 1) return showToast("Error", "Cannot delete the last routine.");
            if(confirm("Delete this entire Routine?")) {
                state.routines.splice(state.activeIndex, 1);
                state.activeIndex = 0;
                saveData(); closeModal('system-modal'); renderTabs(); renderList();
            }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.routines));
            const node = document.createElement('a');
            node.setAttribute("href", dataStr);
            node.setAttribute("download", "zenithOS_backup.json");
            document.body.appendChild(node);
            node.click();
            node.remove();
            showToast("Exported", "Data successfully saved.");
        }

        // --- 8. UTILITIES ---
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function saveData() { localStorage.setItem('zenith_data_v4', JSON.stringify(state.routines)); }
        function getM(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
        
        function handleHotkeys(e) {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return; 
            if(e.key.toLowerCase() === 'n') openTaskModal();
            if(e.key.toLowerCase() === 'e') toggleTaskEdit();
            if(e.key === 'Escape') document.querySelectorAll('.modal-wrap').forEach(m => m.classList.remove('open'));
        }

        function getSmartIcon(txt) {
            const t = txt.toLowerCase();
            if(t.includes('code') || t.includes('dev') || t.includes('script')) return 'fa-solid fa-code';
            if(t.includes('meditation') || t.includes('zen') || t.includes('focus')) return 'fa-solid fa-brain';
            if(t.includes('gym') || t.includes('exercise') || t.includes('sport')) return 'fa-solid fa-dumbbell';
            if(t.includes('food') || t.includes('break') || t.includes('lunch')) return 'fa-solid fa-utensils';
            if(t.includes('class') || t.includes('study') || t.includes('prep')) return 'fa-solid fa-book-open';
            if(t.includes('sleep') || t.includes('rest') || t.includes('wind')) return 'fa-solid fa-bed';
            return 'fa-solid fa-circle-check';
        }

        // Start Application
        init();
    </script>
</body>
</html>
